name: housing_flutter_app
description: "A Flutter housing application with authentication and API integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons:
  provider:
  http:
  alphabet_list_view: ^1.1.6 
  flutter_secure_storage:
  month_year_picker:
  dotted_border:
  lottie:
  cached_network_image:
  syncfusion_flutter_charts:
  shimmer:
  intl:
  image_picker:
  permission_handler:
  dropdown_search:
  path_provider:
  video_thumbnail:
  shared_preferences:
  get:
  connectivity_plus:
  internet_connection_checker_plus:
  multi_image_picker_view:
  awesome_snackbar_content:
  salomon_bottom_bar:
  font_awesome_flutter:
  flutter_svg:
  geolocator:
  geocoding:
  google_fonts:
  smooth_page_indicator:
  video_player:
  share_plus: ^12.0.0
  url_launcher:
  readmore:
  clipboard:
  speech_to_text: 
  fl_chart:
  easy_stepper:
  dropdown_button2:
  flutter_tts:
  persistent_bottom_nav_bar:
  http_parser:
  pdf: ^3.10.8
  printing: ^5.12.0
  mime:
  google_maps_flutter:
  fluttertoast:
  
  file_picker:
  pdfx:
  open_filex:
  flutter_rating_bar: ^4.0.1
  socket_io_client:
  timeago: ^3.7.1
  syncfusion_flutter_pdfviewer:
  device_info_plus:
  model_viewer_plus:
  excel:


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  build_runner:
  logger:

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/logo/
    - assets/icons/
    - assets/amenities/
    - assets/furnishing/
    - assets/fonts/
    - assets/icons/comments/
    - assets/icons/employee/
    - assets/icons/functions/
    - assets/icons/member/
    - assets/icons/native_icons/
    - assets/icons/native_icons/actions/
    - assets/icons/native_icons/auth/
    - assets/icons/native_icons/business/
    - assets/icons/native_icons/date_time/
    - assets/icons/native_icons/file/
    - assets/icons/native_icons/media/
    - assets/icons/native_icons/navigation/
    - assets/icons/native_icons/navigation/arrow/
    - assets/icons/native_icons/notification/
    - assets/icons/native_icons/system/
    - assets/icons/native_icons/ui/
    - assets/svg/
    - assets/icons/third_party/

    #- .env

  # Comment out fonts until they are available
  fonts:
    - family: NuNunito_Sans
      fonts:
        - asset: assets/fonts/NuNunito_Sans/NunitoSans_10pt-ExtraLight.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/NuNunito_Sans/NunitoSans_10pt-Light.ttf
          weight: 300
        - asset: assets/fonts/NuNunito_Sans/NunitoSans_10pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/NuNunito_Sans/NunitoSans_10pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/NuNunito_Sans/NunitoSans_10pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NuNunito_Sans/NunitoSans_10pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/NuNunito_Sans/NunitoSans_10pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/NuNunito_Sans/NunitoSans_10pt-Black.ttf
          weight: 900

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins/Poppins-ExtraBold.ttf
          weight: 800




